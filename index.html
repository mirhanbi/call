<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선생님 호출 키오스크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            letter-spacing: 0.5px;
        }

        /* 터치 시 깜빡임(하이라이트) 방지 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        .teacher-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .teacher-card:active {
            transform: scale(0.92);
            background-color: #fce7f3;
            border-color: #f472b6;
        }
        
        /* 현재 호출 중인 선생님 표시 애니메이션 */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        
        .calling {
            background-color: #fdf2f8;
            border-color: #f472b6;
            animation: pulse-border 1.5s infinite;
            transform: scale(1.05);
            z-index: 10;
        }

        /* 취소 버튼 붉은 테두리 애니메이션 */
        @keyframes cancel-border-pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); border-color: #ef4444; }
            50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); border-color: #fca5a5; }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); border-color: #ef4444; }
        }
        
        .cancel-anim {
            animation: cancel-border-pulse 1.5s infinite;
            color: #ef4444; /* Tailwind red-500 */
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-rose-50 to-amber-50 min-h-screen text-stone-800 font-sans selection:bg-pink-200">

    <div class="max-w-6xl mx-auto px-2 py-4 md:py-6 flex flex-col min-h-screen">
        <div class="flex-grow">
            <!-- 헤더 영역 -->
            <header class="text-center mb-4">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-white/70 backdrop-blur-sm rounded-full mb-2 shadow-sm border border-pink-200 text-3xl transform hover:rotate-12 transition-transform cursor-default">
                    🌸
                </div>
                
                <!-- 제목과 취소 버튼을 나란히 배치하기 위한 Wrapper -->
                <div class="relative inline-flex items-center justify-center mb-1">
                    <h1 class="text-2xl md:text-3xl font-normal text-rose-500 tracking-wide drop-shadow-sm">&lt;선생님 호출 키오스크&gt;</h1>
                    
                    <!-- 제목 우측 호출 취소 버튼 (크기 확대 및 붉은 애니메이션 적용) -->
                    <button id="cancel-btn" onclick="cancelCall()" class="absolute left-full ml-4 flex items-center justify-center whitespace-nowrap gap-1.5 bg-white/95 backdrop-blur-sm border-2 hover:bg-red-50 rounded-full px-5 py-2 shadow-md transition-all duration-300 focus:outline-none active:scale-95 opacity-0 pointer-events-none scale-90 z-20 cancel-anim">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                        <span class="text-base font-sans font-bold">호출 취소</span>
                    </button>
                </div>

                <p class="text-rose-400 text-sm md:text-base mt-1">용무가 있는 선생님을 콕! 눌러주세요 🌷</p>
            </header>

            <!-- 상태 표시줄 -->
            <div id="status-bar" class="h-6 mb-3 text-center text-rose-500 font-normal text-base md:text-lg opacity-0 transition-opacity duration-300">
                호출 중입니다...
            </div>

            <!-- 선생님 목록 그리드 -->
            <div id="teacher-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-7 gap-2 md:gap-3 pb-2">
                <!-- 자바스크립트로 버튼이 생성되어 여기에 삽입됩니다 -->
            </div>
        </div>
    </div>

    <script>
        // 선생님 데이터 배열
        const teachers = [
            { name: "김인숙", subject: "정보컴퓨터" },
            { name: "김광현", subject: "기술" },
            { name: "권진혁", subject: "학생부장/음악" },
            { name: "박혜숙", subject: "영어" },
            { name: "이창용", subject: "체육" },
            { name: "황진국", subject: "국어" },
            { name: "빈수민", subject: "역사" },
            { name: "최윤주", subject: "영어" },
            { name: "윤규태", subject: "물리" },
            { name: "박소정", subject: "일사" },
            { name: "이준우", subject: "지리" },
            { name: "이선아", subject: "수학" },
            { name: "권세라", subject: "수학" },
            { name: "박경내", subject: "물리" },
            { name: "신수정", subject: "학적" },
            { name: "박선영", subject: "지구과학" },
            { name: "김성희", subject: "역사" },
            { name: "허두영", subject: "정보" },
            { name: "김고운", subject: "역사" },
            { name: "김광희", subject: "중국어" },
            { name: "박소은", subject: "특수" }
        ];

        const gridContainer = document.getElementById('teacher-grid');
        const statusBar = document.getElementById('status-bar');
        
        let currentCard = null;
        let audioCtx = null; 
        let dingDongTimeout = null; 
        let activeOscillators = []; 
        let activeVoiceAudio = null;

        // 종소리(딩동) 효과음 생성 함수
        function playDingDong(callback) {
            if (dingDongTimeout) clearTimeout(dingDongTimeout);

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) {
                if (callback) callback();
                return;
            }

            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // 첫 번째 소리 (딩)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            gain1.gain.setValueAtTime(0, audioCtx.currentTime);
            gain1.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.5);
            activeOscillators.push(osc1);

            // 두 번째 소리 (동)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(523.25, audioCtx.currentTime + 0.4);
            gain2.gain.setValueAtTime(0, audioCtx.currentTime + 0.4);
            gain2.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.45);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(audioCtx.currentTime + 0.4);
            osc2.stop(audioCtx.currentTime + 1.5);
            activeOscillators.push(osc2);

            dingDongTimeout = setTimeout(() => {
                activeOscillators = [];
                if (callback) callback();
            }, 1200);
        }

        // 호출 취소 함수
        function cancelCall() {
            // 브라우저 내장 TTS가 대체 수단으로 실행 중일 경우 중지
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            // 재생 중인 선생님 음성(.wav) 중지
            if (activeVoiceAudio) {
                activeVoiceAudio.pause();
                activeVoiceAudio.currentTime = 0;
                activeVoiceAudio = null;
            }

            // 종소리 진행 중지
            if (dingDongTimeout) {
                clearTimeout(dingDongTimeout);
                dingDongTimeout = null;
            }
            activeOscillators.forEach(osc => {
                try { osc.stop(); osc.disconnect(); } catch (e) {}
            });
            activeOscillators = [];

            // 취소 버튼 숨기기
            const cancelBtn = document.getElementById('cancel-btn');
            if (cancelBtn) {
                cancelBtn.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
                cancelBtn.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
            }

            // UI 초기화
            if (currentCard) {
                currentCard.classList.remove('calling');
                currentCard = null;
                statusBar.textContent = "❌ 호출이 취소되었습니다.";
                setTimeout(() => {
                    if (!currentCard) statusBar.classList.add('opacity-0');
                }, 1500);
            }
        }

        // 선생님 카드 생성
        function renderTeachers() {
            teachers.forEach((teacher, index) => {
                const button = document.createElement('button');
                button.className = "teacher-card bg-white/80 backdrop-blur-sm border-2 border-pink-100 rounded-2xl py-3 px-2 shadow-sm hover:shadow-lg hover:-translate-y-1 hover:border-pink-300 flex flex-col items-center justify-center text-center cursor-pointer outline-none focus:ring-4 focus:ring-pink-300 focus:ring-opacity-50 relative";
                
                button.innerHTML = `
                    <span class="text-lg md:text-xl font-normal text-stone-700 mb-1.5">${teacher.name}</span>
                    <span class="text-xs md:text-sm text-rose-500 font-normal break-keep bg-rose-50 px-2.5 py-0.5 rounded-full border border-rose-100">${teacher.subject}</span>
                `;

                button.addEventListener('click', () => callTeacher(teacher.name, button));
                gridContainer.appendChild(button);
            });
        }

        // 선생님 호출 및 저장된 WAV 파일 재생
        function callTeacher(name, buttonElement) {
            cancelCall();

            currentCard = buttonElement;
            currentCard.classList.add('calling');
            
            statusBar.textContent = `🎵 "${name} 선생님"을 부르는 중이에요! 🌸`;
            statusBar.classList.remove('opacity-0');

            // 취소 버튼 표시
            const cancelBtn = document.getElementById('cancel-btn');
            if (cancelBtn) {
                cancelBtn.classList.remove('opacity-0', 'scale-90', 'pointer-events-none');
                cancelBtn.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
            }

            // UI 초기화 헬퍼 함수
            const resetUI = () => {
                if (currentCard === buttonElement) {
                    currentCard.classList.remove('calling');
                    statusBar.classList.add('opacity-0');
                    currentCard = null;

                    const btn = document.getElementById('cancel-btn');
                    if (btn) {
                        btn.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
                        btn.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
                    }
                }
            };

            playDingDong(() => {
                if (currentCard !== buttonElement) return;

                // WAV 파일 경로 설정
                const audioUrl = `./sounds/${name}.wav`;
                
                activeVoiceAudio = new Audio(audioUrl);
                
                activeVoiceAudio.onended = resetUI;
                
                // 파일이 없을 경우 (미리보기 화면이거나 sounds 폴더를 안 만든 경우)
                activeVoiceAudio.onerror = () => {
                    // 에러 시 브라우저 내장 TTS로 대체 동작 (Fallback)
                    if ('speechSynthesis' in window) {
                        const textToSpeak = `${name} 선생님, 용무 있어 왔습니다. ${name} 선생님, 용무 있어 왔습니다.`;
                        const utterance = new SpeechSynthesisUtterance(textToSpeak);
                        utterance.lang = 'ko-KR';
                        utterance.rate = 0.95;
                        utterance.pitch = 1.1;
                        
                        utterance.onend = resetUI;
                        utterance.onerror = () => {
                            statusBar.textContent = `⚠️ 음성 파일이 없습니다! (sounds/${name}.wav)`;
                            setTimeout(resetUI, 3000);
                        };
                        window.speechSynthesis.speak(utterance);
                    } else {
                        // TTS마저 지원 안 되는 환경일 경우 에러 메시지 표시
                        statusBar.textContent = `⚠️ 음성 파일이 없습니다! (sounds/${name}.wav)`;
                        setTimeout(resetUI, 3000);
                    }
                };

                // play() 실패 에러 무시 (onerror 이벤트에서 처리함)
                activeVoiceAudio.play().catch(e => {});
            });
        }

        // 초기화
        renderTeachers();

    </script>
</body>
</html>
