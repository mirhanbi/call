<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교무실 선생님 호출</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            letter-spacing: 0.5px;
        }

        /* 터치 시 깜빡임(하이라이트) 방지 및 부드러운 전환 효과 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        .teacher-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .teacher-card:active {
            transform: scale(0.92);
            background-color: #fce7f3; /* Tailwind pink-100 */
            border-color: #f472b6; /* Tailwind pink-400 */
        }
        
        /* 현재 호출 중인 선생님 표시 애니메이션 (봄 느낌 핑크) */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        
        .calling {
            background-color: #fdf2f8; /* pink-50 */
            border-color: #f472b6; /* pink-400 */
            animation: pulse-border 1.5s infinite;
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-rose-50 to-amber-50 min-h-screen text-stone-800 font-sans selection:bg-pink-200">

    <div class="max-w-6xl mx-auto px-2 py-4 md:py-6 flex flex-col min-h-screen">
        <div class="flex-grow">
            <!-- 헤더 영역 -->
            <header class="text-center mb-4">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-white/70 backdrop-blur-sm rounded-full mb-2 shadow-sm border border-pink-200 text-3xl transform hover:rotate-12 transition-transform cursor-default">
                    🌸
                </div>
                <h1 class="text-2xl md:text-3xl font-normal text-rose-500 tracking-wide mb-1 drop-shadow-sm">선생님, 계신가요?</h1>
                <p class="text-rose-400 text-sm md:text-base">용무가 있는 선생님을 콕! 눌러주세요 🌷</p>
            </header>

            <!-- 상태 표시줄 (호출 중...) -->
            <div id="status-bar" class="h-6 mb-3 text-center text-rose-500 font-normal text-base md:text-lg opacity-0 transition-opacity duration-300">
                호출 중입니다...
            </div>

            <!-- 선생님 목록 그리드 (한 화면에 들어오도록 열 개수 증가 및 간격 축소) -->
            <div id="teacher-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-7 gap-2 md:gap-3 pb-2">
                <!-- 자바스크립트로 버튼이 생성되어 여기에 삽입됩니다 -->
            </div>
        </div>

        <!-- 하단 호출 취소 버튼 -->
        <div class="flex justify-center mt-4 mb-4">
            <button onclick="cancelCall()" class="flex items-center justify-center gap-2 bg-white/80 backdrop-blur-sm border-2 border-stone-200 text-stone-500 hover:bg-stone-50 hover:text-stone-700 hover:border-stone-300 rounded-full px-6 py-2.5 shadow-sm transition-all focus:outline-none focus:ring-4 focus:ring-stone-200 active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
                <span class="text-lg">호출 취소</span>
            </button>
        </div>
    </div>

    <script>
        // 선생님 데이터 배열
        const teachers = [
            { name: "김인숙", subject: "정보컴퓨터" },
            { name: "김광현", subject: "기술" },
            { name: "권진혁", subject: "학생부장/음악" },
            { name: "박혜숙", subject: "영어" },
            { name: "이창용", subject: "체육" },
            { name: "황진국", subject: "국어" },
            { name: "빈수민", subject: "역사" },
            { name: "최윤주", subject: "영어" },
            { name: "윤규태", subject: "물리" },
            { name: "박소정", subject: "일사" },
            { name: "이준우", subject: "지리" },
            { name: "이선아", subject: "수학" },
            { name: "권세라", subject: "수학" },
            { name: "박경내", subject: "물리" },
            { name: "신수정", subject: "학적" },
            { name: "박선영", subject: "지구과학" },
            { name: "김성희", subject: "역사" },
            { name: "허두영", subject: "정보" },
            { name: "김고운", subject: "역사" },
            { name: "김광희", subject: "중국어" },
            { name: "박소은", subject: "특수" }
        ];

        const gridContainer = document.getElementById('teacher-grid');
        const statusBar = document.getElementById('status-bar');
        
        // 상태 제어를 위한 변수들
        let currentCard = null;
        let audioCtx = null; 
        let dingDongTimeout = null; // 종소리 후 TTS 재생을 위한 타이머
        let activeOscillators = []; // 재생 중인 오디오 노드 보관

        // 브라우저 음성 합성(TTS) 지원 여부 확인
        const isSpeechSupported = 'speechSynthesis' in window;
        
        // 사용 가능한 한국어 목소리를 저장할 배열
        let koreanVoices = [];

        // 목소리 목록을 불러오는 함수
        function loadVoices() {
            const allVoices = window.speechSynthesis.getVoices();
            koreanVoices = allVoices.filter(voice => voice.lang.includes('ko'));
        }

        // 목소리 목록이 변경/로드될 때 배열 업데이트
        if (isSpeechSupported && window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();

        // 종소리(딩동) 효과음 생성 함수
        function playDingDong(callback) {
            // 기존 타이머가 있다면 초기화
            if (dingDongTimeout) {
                clearTimeout(dingDongTimeout);
            }

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) {
                if (callback) callback();
                return;
            }

            if (!audioCtx) {
                audioCtx = new AudioContext();
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 첫 번째 소리 (딩 - E5)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            gain1.gain.setValueAtTime(0, audioCtx.currentTime);
            gain1.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.5);
            activeOscillators.push(osc1);

            // 두 번째 소리 (동 - C5)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(523.25, audioCtx.currentTime + 0.4);
            gain2.gain.setValueAtTime(0, audioCtx.currentTime + 0.4);
            gain2.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.45);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(audioCtx.currentTime + 0.4);
            osc2.stop(audioCtx.currentTime + 1.5);
            activeOscillators.push(osc2);

            // 종소리 재생 후 약 1.2초 뒤에 음성합성(콜백) 실행
            dingDongTimeout = setTimeout(() => {
                activeOscillators = []; // 재생 완료된 오디오 초기화
                if (callback) callback();
            }, 1200);
        }

        // 호출 취소 함수
        function cancelCall() {
            // 1. TTS(음성 합성) 중지
            if (isSpeechSupported) {
                window.speechSynthesis.cancel();
            }

            // 2. 종소리 재생 대기 중지
            if (dingDongTimeout) {
                clearTimeout(dingDongTimeout);
                dingDongTimeout = null;
            }

            // 3. 재생 중인 종소리(Oscillator) 강제 중지
            activeOscillators.forEach(osc => {
                try {
                    osc.stop();
                    osc.disconnect();
                } catch (e) {
                    // 이미 중지된 경우 무시
                }
            });
            activeOscillators = [];

            // 4. UI 및 상태 초기화
            if (currentCard) {
                currentCard.classList.remove('calling');
                currentCard = null;
                
                // 상태 표시줄 텍스트 변경 후 서서히 사라지기
                statusBar.textContent = "❌ 호출이 취소되었습니다.";
                setTimeout(() => {
                    if (!currentCard) {
                        statusBar.classList.add('opacity-0');
                    }
                }, 1500);
            }
        }

        // 선생님 카드 생성 및 화면 렌더링
        function renderTeachers() {
            teachers.forEach((teacher, index) => {
                const button = document.createElement('button');
                button.className = "teacher-card bg-white/80 backdrop-blur-sm border-2 border-pink-100 rounded-2xl py-3 px-2 shadow-sm hover:shadow-lg hover:-translate-y-1 hover:border-pink-300 flex flex-col items-center justify-center text-center cursor-pointer outline-none focus:ring-4 focus:ring-pink-300 focus:ring-opacity-50 relative";
                
                button.innerHTML = `
                    <span class="text-lg md:text-xl font-normal text-stone-700 mb-1.5">${teacher.name}</span>
                    <span class="text-xs md:text-sm text-rose-500 font-normal break-keep bg-rose-50 px-2.5 py-0.5 rounded-full border border-rose-100">${teacher.subject}</span>
                `;

                // 클릭 이벤트 등록
                button.addEventListener('click', () => callTeacher(teacher.name, button));
                
                gridContainer.appendChild(button);
            });
        }

        // 선생님 호출 (TTS 재생)
        function callTeacher(name, buttonElement) {
            if (!isSpeechSupported) {
                alert("이 브라우저에서는 음성 안내를 지원하지 않습니다.");
                return;
            }

            if (koreanVoices.length === 0) loadVoices();

            // 이전 호출을 안전하게 취소하고 시작
            cancelCall();

            // 현재 선택된 카드 강조
            currentCard = buttonElement;
            currentCard.classList.add('calling');
            
            // 상태 표시줄 업데이트
            statusBar.textContent = `🎵 "${name} 선생님"을 부르는 중이에요! 🌸`;
            statusBar.classList.remove('opacity-0');

            // 재생할 문구 설정
            const textToSpeak = `${name} 선생님, 용무 있어 왔습니다. ${name} 선생님, 용무 있어 왔습니다.`;
            
            // 종소리 효과음을 먼저 재생한 뒤 TTS 음성 재생
            playDingDong(() => {
                // 소리 재생 전 카드가 취소되거나 변경되었는지 다시 확인
                if (currentCard !== buttonElement) return;

                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'ko-KR';
                
                // 자연스러운 목소리 고정 로직
                if (koreanVoices.length > 0) {
                    let preferredVoice = koreanVoices.find(voice => voice.name.includes('Yuna')) ||
                                         koreanVoices.find(voice => voice.name.includes('SunHi')) ||
                                         koreanVoices.find(voice => voice.name.includes('Google') || voice.name.includes('Online') || voice.name.includes('Natural'));
                    
                    if (!preferredVoice) {
                        preferredVoice = koreanVoices[0];
                    }
                    utterance.voice = preferredVoice;
                }

                // 속도, 톤(Pitch) 설정
                utterance.rate = 0.95; 
                utterance.pitch = 1.1;  

                utterance.onend = () => {
                    if (currentCard === buttonElement) {
                        currentCard.classList.remove('calling');
                        statusBar.classList.add('opacity-0');
                        currentCard = null;
                    }
                };

                utterance.onerror = () => {
                    if (currentCard === buttonElement) {
                        currentCard.classList.remove('calling');
                        statusBar.classList.add('opacity-0');
                        currentCard = null;
                    }
                };

                window.speechSynthesis.speak(utterance);
            });
        }

        // 초기화 실행
        renderTeachers();

    </script>
</body>
</html>
